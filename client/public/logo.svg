<svg xmlns="http://www.w3.org/2000/svg" viewBox="-5 -5 110 110" width="100" height="100">
  <!-- Three concentric C arcs opening to the right -->
  <!-- Outer C - Dark/Black -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#2d2d2d" stroke-width="8" stroke-dasharray="198 66" stroke-linecap="round" transform="rotate(60 50 50)"/>
  <!-- Middle C - Orange -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="#e67e22" stroke-width="6" stroke-dasharray="151 50" stroke-linecap="round" transform="rotate(60 50 50)"/>
  <!-- Inner C - Gray -->
  <circle cx="50" cy="50" r="22" fill="none" stroke="#777777" stroke-width="5" stroke-dasharray="104 35" stroke-linecap="round" transform="rotate(60 50 50)"/>
</svg>
